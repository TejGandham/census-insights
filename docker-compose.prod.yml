services:
  postgres:
    ports: !reset []
    restart: unless-stopped
    volumes: !override
      - /mnt/census-data/pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_schema.sql
    command: >
      postgres
        -c shared_buffers=1GB
        -c effective_cache_size=3GB
        -c work_mem=64MB
        -c maintenance_work_mem=256MB
        -c full_page_writes=on
        -c random_page_cost=1.1
        -c wal_level=minimal
        -c max_wal_senders=0
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'

  mindsdb:
    ports: !reset []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'

  data-agent:
    volumes: !override
      - /mnt/census-data:/app/data/raw:ro
    ports: !override
      - "8001:8000"
    restart: unless-stopped
    environment:
      - ETL_WORKERS=6
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '6'
