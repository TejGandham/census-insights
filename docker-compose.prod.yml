services:
  postgres:
    ports: !reset []
    restart: unless-stopped
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=32MB
        -c maintenance_work_mem=128MB
        -c full_page_writes=on
        -c random_page_cost=1.1
        -c wal_level=minimal
        -c max_wal_senders=0
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1'

  mindsdb:
    ports: !reset []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'

  data-agent:
    volumes: !override
      - /mnt/census-data:/app/data/raw:ro
    ports: !override
      - "8001:8000"
    restart: unless-stopped
    environment:
      - ETL_WORKERS=6
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '6'
